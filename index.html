<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

<!-- modern-normalize -->

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/1.0.0/modern-normalize.min.css"
/>

<!-- Потім ваші стилі -->
<link rel="stylesheet" href="./style/styles.css">

    <title>AI Search Assistant</title>
  
</head>
<body>

  <div id="authBlock">
    <button class="btn" id="loginBtn">Увійти через Google Account</button>
  </div>

  <div id="mainBlock" class="hidden">
    <div id="userInfo"></div>
    <hr>
    
    <h4>Пошук Гугл</h4>
    <input type="text" id="searchInp" placeholder="Що шукаємо?">
    <button class="btn" id="searchWebBtn" style="background:#34a853">Шукати в Інтернеті</button>
    <button class="btn" id="searchSiteBtn" style="background:#fbbc05">Шукати на нашому сайті</button>
    <hr>

    <h4>Вбудований ШІ Помічник</h4>
    <select id="botSelector">
      <option value="Пряма відповідь без прикрас.">Стандартний 🧑‍💼</option>
      <option value="Ти — пірат. Говори як пірат, використовуй морський сленг.">Пірат 🏴‍☠️</option>
    </select>
    <div class="chat-box" id="chatBox">Вбудований Gemini Nano готовий...</div>
    <input type="text" id="aiInp" placeholder="Запитай ШІ...">
    <button class="btn" id="aiBtn">Запитати</button>
  </div>

  <script src="./js/index.js"></script>
</body>
</html>
